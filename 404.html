<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="The page you are looking for is currently under construction. Please return to the homepage or search our site.">
  <title>Under Construction | Stackly</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-404">

  <div class="error-container">
    <!-- Branding logo top -->
    <a href="index.html" class="logo error-logo" aria-label="Stackly Homepage">
      <img src="assets/stackly-logo.webp" alt="Stackly" class="logo-img" width="220" height="54">
    </a>

    <!-- Construction Helmet Illustration SVG -->
    <div class="helmet-animation-container">
      <svg class="helmet-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="Bouncing yellow hardhat helmet illustration indicating under construction status">
        <defs>
          <linearGradient id="helmet-yellow" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FFE082"/>
            <stop offset="100%" stop-color="#FFB300"/>
          </linearGradient>
          <linearGradient id="helmet-charcoal" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#3c3c3c"/>
            <stop offset="100%" stop-color="#1a1a1a"/>
          </linearGradient>
        </defs>
        <!-- Shadow -->
        <ellipse cx="50" cy="88" rx="28" ry="5" fill="#000000" opacity="0.4"/>
        
        <!-- Main Shell of Helmet -->
        <path d="M22,64 C22,30 36,20 50,20 C64,20 78,30 78,64 Z" fill="url(#helmet-yellow)" stroke="#D49A00" stroke-width="1.5" stroke-linejoin="round"/>
        
        <!-- Top ridge/crest -->
        <path d="M46,20 C46,20 48,38 46,64 L54,64 C52,38 54,20 54,20 Z" fill="#FFE89A" opacity="0.6"/>
        <path d="M48,20 C48,20 50,38 49,64 L51,64 C50,38 52,20 52,20 Z" fill="#FF9F00"/>

        <!-- Visor Brim -->
        <path d="M10,62 C25,62 75,62 90,62 C96,62 96,68 90,68 C75,68 25,68 10,68 C4,68 4,62 10,62 Z" fill="url(#helmet-yellow)" stroke="#D49A00" stroke-width="1" stroke-linejoin="round"/>
        
        <!-- Black strap inside edge -->
        <path d="M18,66 C35,66 65,66 82,66 L82,70 C65,70 35,70 18,70 Z" fill="url(#helmet-charcoal)"/>

        <!-- Accents of steel screws or labels -->
        <circle cx="50" cy="11" r="2.5" fill="#FFB300"/>
        <line x1="50" y1="20" x2="50" y2="13.5" stroke="#FF9F00" stroke-width="1.5"/>
      </svg>
    </div>

    <!-- Error Codes -->
    <div class="big-404">404</div>
    <h1 class="error-heading">Oops! Page Not Found</h1>
    <p class="error-desc">
      The page you're looking for doesn’t exist or has been moved. Let’s get you back to building something great.
    </p>

    <!-- Error Actions -->
    <div class="error-actions">
      <!-- Search Input UI -->
      <form class="error-search-box" action="index.html" method="get">
        <input type="text" class="error-search-input" placeholder="Search building services, projects..." aria-label="Search site resources">
        <button type="submit" class="error-search-btn" aria-label="Submit Search">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
      </form>

      <!-- Go Home Button -->
      <a href="index.html" class="btn btn-primary">Back To Home ↗</a>

      <!-- Quick Links links -->
      <div class="error-quicklinks">
        <div class="error-quicklinks-title">Quick Links:</div>
        <div class="error-quicklinks-links">
          <a href="index.html#home">Home</a>
          <a href="index.html#about">About</a>
          <a href="index.html#services">Services</a>
          <a href="index.html#projects">Projects</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Custom cursor nodes -->
  <div class="custom-cursor-dot" id="custom-cursor-dot" aria-hidden="true"></div>
  <div class="custom-cursor-outline" id="custom-cursor-outline" aria-hidden="true"></div>

  <!-- Inline Cursor Script for 404 page -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const cursorDot = document.getElementById('custom-cursor-dot');
      const cursorOutline = document.getElementById('custom-cursor-outline');

      if (cursorDot && cursorOutline) {
        let mouseX = 0;
        let mouseY = 0;
        let outlineX = 0;
        let outlineY = 0;
        let isCursorVisible = false;

        window.addEventListener('mousemove', (e) => {
          mouseX = e.clientX;
          mouseY = e.clientY;

          if (!isCursorVisible) {
            cursorDot.style.opacity = '1';
            cursorOutline.style.opacity = '1';
            isCursorVisible = true;
          }

          cursorDot.style.left = mouseX + 'px';
          cursorDot.style.top = mouseY + 'px';
        });

        const animateCursor = () => {
          const ease = 0.15;
          outlineX += (mouseX - outlineX) * ease;
          outlineY += (mouseY - outlineY) * ease;

          cursorOutline.style.left = outlineX + 'px';
          cursorOutline.style.top = outlineY + 'px';

          requestAnimationFrame(animateCursor);
        };
        requestAnimationFrame(animateCursor);

        const interactives = document.querySelectorAll('a, button, input, textarea');
        const handleMouseEnter = () => document.body.classList.add('cursor-hover');
        const handleMouseLeave = () => document.body.classList.remove('cursor-hover');

        interactives.forEach(el => {
          el.addEventListener('mouseenter', handleMouseEnter);
          el.addEventListener('mouseleave', handleMouseLeave);
        });

        document.addEventListener('mouseleave', () => {
          cursorDot.style.opacity = '0';
          cursorOutline.style.opacity = '0';
          isCursorVisible = false;
        });

        document.addEventListener('mouseenter', () => {
          cursorDot.style.opacity = '1';
          cursorOutline.style.opacity = '1';
          isCursorVisible = true;
        });
      }
    });
  </script>
</body>
</html>
